<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style>
.file_drop_area {
	width: 200px;
	height: 200px;
	border: 2px dashed #e9e9e9;
	background-image: url('file.png');
	background-repeat: no-repeat;
	background-position: center;
}

#file {
	display: none;
}
</style>
<script>
	window.onload = () => {
		let file_area = document.querySelector('.file_drop_area');
		file_area.ondrop = (e) => {
			e.preventDefault();
			console.log(e);
		}
		
		file_area.ondragover = (e) => {
			e.preventDefault();
		}
		file_area.ondragenter = (e) => {
			e.preventDefault();
		}
		file_area.ondragleave = (e) => {
			e.preventDefault();
		}
		
		
	}

</script>
</head>
<body>
	<form action="./fileUpload.do" method="post"
		enctype="multipart/form-data">
		<div class="file_drop_area"></div>
		<input type="file" name="file" id="file">
		<button>전송</button>
	</form>

	<hr>
	<div class="file_list_view"></div>
</body>
</html>
