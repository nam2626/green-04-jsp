<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style>
.file_drop_area {
	width: 200px;
	height: 200px;
	border: 2px dashed #e9e9e9;
	background-image: url('file.png');
	background-repeat: no-repeat;
	background-position: center;
}

#file {
	display: none;
}
.active{
		box-shadow: 0px 0px 3px 5px red;
		background-color: rgba(255,0,0,0.5);
	}
</style>
<script>
	window.onload = () => {
		let file_area = document.querySelector('.file_drop_area');
		let file = document.querySelector('#file');
		
		file_area.ondrop = (e) => {
			e.preventDefault();
			console.log(e);
			const data = e.dataTransfer;
			console.log(data);
			console.log(data.files);
			
			file.files = data.files;
			
			const file_list_view = document.querySelector(".file_list_view");
			file_list_view.innerHTML = '';
			for(i=0;i<data.files.length;i++){
				console.log(data.files[i].name);
				file_list_view.innerHTML += data.files[i].name + "<br>"
			}
		}
		
		file_area.ondragover = (e) => {
			e.preventDefault();
		}
		file_area.ondragenter = (e) => {
			e.preventDefault();
		}
		file_area.ondragleave = (e) => {
			e.preventDefault();
		}
		
		
	}

</script>
</head>
<body>
	<form action="./fileUpload.do" method="post"
		enctype="multipart/form-data">
		<div class="file_drop_area"></div>
		<input type="file" name="file" id="file">
		<button>전송</button>
	</form>

	<hr>
	<div class="file_list_view"></div>
</body>
</html>
