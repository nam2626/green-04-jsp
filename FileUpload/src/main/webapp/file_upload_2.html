<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AJAX 파일 업로드</title>
<script>
	window.onload = () => {
		// [업로드 버튼 클릭 이벤트]
		document.querySelector('.btn_upload').onclick = () => {
			// 1. 화면에 있는 모든 파일 입력 칸과 텍스트 입력 칸을 선택합니다.
			const fileList = document.querySelectorAll('input[type=file]');
			const textList = document.querySelectorAll('input:not(input[type=file])');
			
			// 2. FormData 객체를 생성합니다. 
			// 이 객체는 <form enctype="multipart/form-data">와 동일한 역할을 하는 자바스크립트 객체입니다.
			const formData = new FormData();
			
			// 3. 파일 데이터를 FormData에 담습니다. 
			// item.files[0]은 사용자가 선택한 실제 파일 객체를 의미합니다.
			fileList.forEach(item => {
				if(item.files.length > 0) {
					formData.append('file', item.files[0]);
				}
			});
			
			// 4. 일반 텍스트 데이터도 FormData에 담습니다.
			textList.forEach(item => formData.append(item.name, item.value));
			
			// 5. fetch API를 이용해 서버로 비동기 전송을 시작합니다.
			// body에 formData를 담아 보내면 브라우저가 알아서 multipart/form-data 설정을 해줍니다.
			fetch('./fileUpload.do',{
				method : 'POST',
				body : formData
			}).then(response => response.text()) // 현재 서블릿이 텍스트로 응답하므로 text()로 받습니다.
			.then(data =>{
				console.log("서버 응답 결과: ", data);
				alert("업로드 완료!");
			}).catch(error => {
				console.error("오류 발생:", error);
			});
		}
	}
</script>
</head>
<body>
	<h2>파일 업로드 테스트 (AJAX 방식)</h2>
	내용1 : <input type="text" name="txt1"><br>
	내용2 : <input type="text" name="txt2"><br>
	<br> 
	파일 선택 : <input type="file" name="file"><br>
	파일 선택 : <input type="file" name="file"><br>
	파일 선택 : <input type="file" name="file"><br>
	<br>
	<button class="btn_upload">파일 업로드 시작</button>
</body>
</html>
